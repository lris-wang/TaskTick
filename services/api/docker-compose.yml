# 生产环境完整依赖
#   docker compose up -d
#   .env 中设置:
#     DATABASE_URL=postgresql+asyncpg://tasktick:tasktick_secret@postgres:5432/tasktick_db
#     REDIS_URL=redis://default:tasktick_redis@redis:6379/0
#     SECRET_KEY=your-secret-key-here
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tasktick_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasktick_db
      POSTGRES_USER: tasktick
      POSTGRES_PASSWORD: tasktick_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasktick -d tasktick_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tasktick_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: tasktick_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasktick_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://tasktick:tasktick_secret@postgres:5432/tasktick_db
      REDIS_URL: redis://default:tasktick_redis@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-tasktick-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:

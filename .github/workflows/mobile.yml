name: Build Mobile App (Android APK + AAB)

on:
  push:
    tags:
      - "v*"          # 打标签时构建，如 v1.0.0
  workflow_dispatch:       # 也可手动触发

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Build web
        run: pnpm --filter web build

      - name: Sync Capacitor
        run: pnpm --filter @tasktick/mobile cap sync
        env:
          VITE_API_URL: ${{ secrets.ANDROID_VITE_API_URL }}

      # ---------- APK 签名（仅 tag 构建时） ----------
      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo -n "$RELEASE_KEYSTORE_BASE64" | base64 --decode --output android/app/release.jks
          echo "RELEASE_KEYSTORE_FILE=$((pwd)/android/app/release.jks)" >> $GITHUB_ENV

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_FILE: ${{ env.RELEASE_KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -P keystore.file="$KEYSTORE_FILE" \
            -P keystore.password="$KEYSTORE_PASSWORD" \
            -P key.alias="$KEY_ALIAS" \
            -P key.password="$KEY_PASSWORD"
          # 重命名输出文件含版本
          cp app/build/outputs/apk/release/app-release.apk \
             "../app/build/outputs/apk/release/TaskTick-${{ github.ref_name }}-release.apk"

      - name: Build debug APK
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: |
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk \
             "../app/build/outputs/apk/debug/TaskTick-debug.apk"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tasktick-android
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  release:
    needs: [android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tasktick-android/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
